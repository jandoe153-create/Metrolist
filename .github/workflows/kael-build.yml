name: Build APK (Kael)

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Varian build"
        type: choice
        default: release
        options:
          - release
          - debug

jobs:
  build:
    name: Build Foss ${{ inputs.variant || 'release' }} APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Release: R8 + shrink resource + split per-ABI, signed pakai
      # persistent-debug.keystore yang dicommit (signature stabil antar build).
      - name: Build APK (no lint, no secrets)
        run: |
          if [ "${{ inputs.variant || 'release' }}" = "debug" ]; then
            ./gradlew --console=plain assembleFossDebug --warning-mode summary -x lint
          else
            ./gradlew --console=plain assembleFossRelease --warning-mode summary -x lint
          fi
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist
          METROLIST_SPLIT_ABI: ${{ (inputs.variant || 'release') == 'release' && 'true' || 'false' }}
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: metrolist-foss-${{ inputs.variant || 'release' }}
          path: app/build/outputs/apk/foss/*/*.apk
