name: Build APK (Kael)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Foss Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (no lint, no secrets)
        run: ./gradlew --console=plain assembleFossDebug --warning-mode summary -x lint
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music
          METROLIST_APP_NAME: Metrolist
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: metrolist-foss-debug
          path: app/build/outputs/apk/foss/debug/*.apk
